<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foster+freeman Visitor Kiosk</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#49ae34">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://api.printnode.com/client/printnode.js"></script>
    
    <style>
        :root { --primary: #49ae34; --bg: #49ae34; --text: #333; --accent: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95vh; }
        
        .view { display: none; width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .active { display: block; }

        /* UI ELEMENTS */
        .software-logo { position: fixed; top: 15px; right: 15px; width: 80px; opacity: 0.6; z-index: 100; }
        
        /* Language Toggle Button */
        .lang-toggle { 
            position: fixed; top: 15px; left: 15px; background: white; border: 1px solid #ccc; 
            padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Buttons & Forms */
        .btn { display: block; width: 100%; padding: 20px; margin: 15px 0; font-size: 1.5em; color: white; background-color: var(--primary); border: none; border-radius: 8px; cursor: pointer; }
        .btn-secondary { background-color: #6c757d; }
        input[type="text"], textarea { width: 90%; padding: 15px; margin: 10px 0; font-size: 1.2em; border: 1px solid #ccc; border-radius: 6px; }
        
        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 12px; }
        
        /* Language Grid */
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .lang-btn { padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1.1em; background: #f9f9f9; }
        .lang-btn:hover { background: #eee; }

        canvas { border: 2px dashed #ccc; border-radius: 8px; width: 100%; height: 200px; background: #fafafa; }
    </style>
</head>
<body>

    <button class="lang-toggle" onclick="openLangModal()">🌐 Languages</button>
    <img src="assets/software-logo.png" alt="Logo" class="software-logo">

    <div id="lang-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Select Language</h2>
            <div class="lang-grid">
                <div class="lang-btn" onclick="setLanguage('en')">🇬🇧 English</div>
                <div class="lang-btn" onclick="setLanguage('es')">🇪🇸 Español</div>
                <div class="lang-btn" onclick="setLanguage('fr')">🇫🇷 Français</div>
                <div class="lang-btn" onclick="setLanguage('de')">🇩🇪 Deutsch</div>
            </div>
            <button class="btn btn-secondary" onclick="closeLangModal()">Close</button>
        </div>
    </div>

    <div id="home-screen" class="view active">
        <img src="assets/newlogo.jpeg" style="width: 200px; margin-bottom: 10px;">
        <h1 data-key="welcome">Welcome</h1>
        <p data-key="mandatory_notice">Signing IN and OUT is mandatory for evacuation procedures.</p>
        <button class="btn" onclick="showScreen('type-screen')" data-key="btn_signin">Sign In</button>
        <button class="btn btn-secondary" onclick="startScanner('SignOut')" data-key="btn_signout">Sign Out</button>
    </div>

    <div id="type-screen" class="view">
        <h2 data-key="who_visiting">Who are you visiting as?</h2>
        <button class="btn" onclick="startForm('Visitor')" data-key="type_visitor">Visitor</button>
        <button class="btn" onclick="startForm('Contractor')" data-key="type_contractor">Contractor</button>
        <button class="btn btn-secondary" onclick="showScreen('home-screen')" data-key="btn_back">Back</button>
    </div>

    <div id="form-screen" class="view">
        <h2 id="form-title" data-key="signin_title">Sign In</h2>
        <input type="text" id="name" data-placeholder="ph_name" placeholder="Full Name">
        <input type="text" id="company" data-placeholder="ph_company" placeholder="Company Name">
        <input type="text" id="contact" data-placeholder="ph_contact" placeholder="F+F Contact Person">
        <button class="btn" onclick="submitDetails()" data-key="btn_next">Next</button>
    </div>

    <script>
        // TRANSLATIONS DICTIONARY
        const translations = {
            en: {
                welcome: "Welcome",
                mandatory_notice: "Signing IN and OUT is mandatory for evacuation procedures.",
                btn_signin: "Sign In",
                btn_signout: "Sign Out",
                who_visiting: "Who are you visiting as?",
                type_visitor: "Visitor",
                type_contractor: "Contractor",
                btn_back: "Back",
                signin_title: "Sign In",
                ph_name: "Full Name",
                ph_company: "Company Name",
                ph_contact: "F+F Contact Person",
                btn_next: "Next"
            },
            es: {
                welcome: "Bienvenido",
                mandatory_notice: "Registrar la ENTRADA y SALIDA es obligatorio para los procedimientos de evacuación.",
                btn_signin: "Entrar",
                btn_signout: "Salir",
                who_visiting: "¿Como quién nos visita?",
                type_visitor: "Visitante",
                type_contractor: "Contratista",
                btn_back: "Atrás",
                signin_title: "Registro",
                ph_name: "Nombre Completo",
                ph_company: "Nombre de la Empresa",
                ph_contact: "Persona de contacto de F+F",
                btn_next: "Siguiente"
            },
            fr: {
                welcome: "Bienvenue",
                mandatory_notice: "L'enregistrement à l'ENTRÉE et à la SORTIE est obligatoire pour les procédures d'évacuation.",
                btn_signin: "Se Connecter",
                btn_signout: "Se Déconnecter",
                who_visiting: "En quelle qualité visitez-vous?",
                type_visitor: "Visiteur",
                type_contractor: "Entrepreneur",
                btn_back: "Retour",
                signin_title: "S'identifier",
                ph_name: "Nom Complet",
                ph_company: "Nom de l'entreprise",
                ph_contact: "Contact chez F+F",
                btn_next: "Suivant"
            }
        };

        let currentLang = 'en';

        function openLangModal() { document.getElementById('lang-modal').style.display = 'flex'; }
        function closeLangModal() { document.getElementById('lang-modal').style.display = 'none'; }

        function setLanguage(lang) {
            currentLang = lang;
            const langData = translations[lang];

            // Update all elements with data-key
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (langData[key]) el.innerText = langData[key];
            });

            // Update Placeholders
            document.querySelectorAll('[data-placeholder]').forEach(el => {
                const key = el.getAttribute('data-placeholder');
                if (langData[key]) el.placeholder = langData[key];
            });

            closeLangModal();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Logic for form starting
        function startForm(type) {
            const titleEl = document.getElementById('form-title');
            titleEl.innerText = (currentLang === 'es' ? 'Registro de ' : 'Sign In as ') + type;
            showScreen('form-screen');
        }

        // Initialize with default placeholders
        setLanguage('en');
    </script>
</body>
</html>
